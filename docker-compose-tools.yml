version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: arch_jenkins
    environment:
      - DOCKER_API_VERSION=1.43
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bank-network

volumes:
  jenkins_home:

networks:
  bank-network:
    external: true